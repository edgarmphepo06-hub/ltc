<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lilongwe Technical College - Empowering technical excellence through quality education in Engineering, IT, Business, Hospitality and more." />
  <title>Lilongwe Technical College</title>

  <!-- Ensure the page always opens/refreshes at the top (Home) -->
  <script>
    if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }
    window.addEventListener('load', function () {
      window.scrollTo(0, 0);
      if (location.hash) {
        history.replaceState(null, '', location.pathname + location.search);
      }
    });
  </script>

  <!-- React + ReactDOM + Babel (CDN, no build step required) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============ BRAND COLORS ============ */
    :root {
      --blue: #003366;
      --blue-light: #0a4d8c;
      --gold: #f5b301;
      --gold-light: #ffc928;
      --white: #ffffff;
      --light-gray: #f4f6f9;
      --dark-text: #1f2937;
      --muted: #5b6472;
      --shadow: 0 8px 24px rgba(0, 51, 102, 0.12);
      --shadow-hover: 0 14px 36px rgba(0, 51, 102, 0.22);
      --radius: 14px;
      --maxw: 1180px;
    }

    /* ============ RESET ============ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Open Sans', sans-serif;
      color: var(--dark-text);
      background: var(--white);
      line-height: 1.65;
      overflow-x: hidden;
    }
    h1, h2, h3, h4, h5 { font-family: 'Poppins', sans-serif; line-height: 1.25; color: var(--blue); }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ul { list-style: none; }
    button { font-family: inherit; cursor: pointer; border: none; }

    .container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }
    .section { padding: 80px 0; }
    .section-alt { background: var(--light-gray); }
    .section-title { text-align: center; font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 12px; }
    .section-sub { text-align: center; color: var(--muted); max-width: 640px; margin: 0 auto 48px; font-size: 1.05rem; }
    .gold-bar { width: 70px; height: 4px; background: var(--gold); margin: 0 auto 24px; border-radius: 4px; }

    /* ============ BUTTONS ============ */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border-radius: 50px; font-weight: 600; font-family: 'Poppins', sans-serif;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease; font-size: .98rem;
    }
    .btn-primary { background: var(--gold); color: var(--blue); box-shadow: 0 6px 18px rgba(245,179,1,.4); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(245,179,1,.55); }
    .btn-outline { background: transparent; border: 2px solid var(--white); color: var(--white); }
    .btn-outline:hover { background: var(--white); color: var(--blue); transform: translateY(-3px); }
    .btn-blue { background: var(--blue); color: var(--white); box-shadow: 0 6px 18px rgba(0,51,102,.3); }
    .btn-blue:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(0,51,102,.45); }

    /* ============ HEADER ============ */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(0,51,102,.96); backdrop-filter: blur(8px);
      box-shadow: 0 2px 16px rgba(0,0,0,.15); transition: all .3s ease;
    }
    .nav { display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .logo { display: flex; align-items: center; gap: 12px; color: var(--white); font-weight: 700; font-family: 'Poppins'; font-size: 1.15rem; }
    .logo-mark {
      width: 42px; height: 42px; border-radius: 10px; background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: grid; place-items: center; color: var(--blue); font-weight: 800; font-size: 1.1rem; font-family: 'Poppins';
    }
    .logo span small { display: block; font-size: .68rem; font-weight: 400; color: var(--gold-light); letter-spacing: 1px; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a { color: var(--white); font-weight: 500; font-size: .95rem; position: relative; transition: color .2s; }
    .nav-links a::after { content: ''; position: absolute; left: 0; bottom: -6px; width: 0; height: 2px; background: var(--gold); transition: width .25s; }
    .nav-links a:hover { color: var(--gold-light); }
    .nav-links a:hover::after { width: 100%; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; padding: 6px; }
    .hamburger span { width: 26px; height: 3px; background: var(--white); border-radius: 3px; transition: .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* ============ HERO ============ */
    .hero {
      min-height: 100vh; display: flex; align-items: center; position: relative;
      background: linear-gradient(135deg, rgba(0,51,102,.92), rgba(10,77,140,.85)), url('https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=1600&q=80') center/cover;
      color: var(--white); padding-top: 72px;
    }
    .hero-content { max-width: 720px; animation: fadeUp 1s ease both; }
    .hero h1 { color: var(--white); font-size: clamp(2.2rem, 6vw, 3.8rem); font-weight: 700; margin-bottom: 18px; }
    .hero h1 .hl { color: var(--gold); }
    .hero p { font-size: 1.15rem; margin-bottom: 32px; opacity: .95; }
    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-stats { display: flex; gap: 40px; margin-top: 54px; flex-wrap: wrap; }
    .hero-stats .stat strong { display: block; font-size: 2rem; font-family: 'Poppins'; color: var(--gold); }
    .hero-stats .stat span { font-size: .9rem; opacity: .85; }

    /* ============ CARDS / GRID ============ */
    .grid { display: grid; gap: 28px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .card {
      background: var(--white); border-radius: var(--radius); padding: 32px 26px;
      box-shadow: var(--shadow); transition: transform .3s ease, box-shadow .3s ease; border-top: 4px solid var(--gold);
    }
    .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
    .card .icon { font-size: 2.2rem; margin-bottom: 14px; }
    .card h3 { font-size: 1.25rem; margin-bottom: 10px; }
    .card p { color: var(--muted); font-size: .96rem; }

    /* ============ ABOUT ============ */
    .about-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    .about-img { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .values-list { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-top: 20px; }
    .value-item { background: var(--light-gray); padding: 16px; border-radius: 10px; border-left: 4px solid var(--gold); font-weight: 500; }

    /* ============ COURSES ============ */
    .course-card { position: relative; overflow: hidden; }
    .course-card .badge { position: absolute; top: 16px; right: 16px; background: var(--blue); color: var(--white); font-size: .72rem; padding: 4px 12px; border-radius: 30px; font-weight: 600; }

    /* ============ ADMISSIONS ============ */
    .steps { counter-reset: step; }
    .step { display: flex; gap: 18px; align-items: flex-start; padding: 18px 0; border-bottom: 1px dashed #d4dbe5; }
    .step::before { counter-increment: step; content: counter(step); flex: 0 0 44px; height: 44px; border-radius: 50%; background: var(--gold); color: var(--blue); display: grid; place-items: center; font-weight: 700; font-family: 'Poppins'; }

    /* ============ NEWS ============ */
    .news-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 16px; }
    .news-meta { font-size: .8rem; color: var(--gold); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .event-item { display: flex; gap: 16px; align-items: center; background: var(--white); padding: 18px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 16px; }
    .event-date { flex: 0 0 64px; text-align: center; background: var(--blue); color: var(--white); border-radius: 10px; padding: 10px; }
    .event-date strong { display: block; font-size: 1.5rem; font-family: 'Poppins'; }
    .event-date span { font-size: .7rem; text-transform: uppercase; }

    /* ============ GALLERY ============ */
    .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .gallery-grid figure { overflow: hidden; border-radius: 12px; position: relative; }
    .gallery-grid img { width: 100%; height: 200px; object-fit: cover; transition: transform .4s ease; }
    .gallery-grid figure:hover img { transform: scale(1.12); }
    .gallery-grid figure::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,51,102,.5)); opacity: 0; transition: .3s; }
    .gallery-grid figure:hover::after { opacity: 1; }

    /* ============ CONTACT ============ */
    .contact-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .contact-info li { display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-start; }
    .contact-info .ci-icon { flex: 0 0 42px; height: 42px; border-radius: 10px; background: var(--gold); color: var(--blue); display: grid; place-items: center; font-size: 1.2rem; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px 14px; border: 1px solid #d4dbe5; border-radius: 10px; font-family: inherit; font-size: .95rem; transition: border .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,51,102,.12); }
    .form-msg { padding: 12px; border-radius: 10px; margin-bottom: 16px; background: #e7f6ec; color: #1c7c43; font-size: .9rem; font-weight: 600; }
    .map-wrap { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-top: 32px; }

    /* ============ FOOTER ============ */
    footer { background: var(--blue); color: #cdd8e8; padding: 56px 0 24px; }
    .footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 32px; }
    footer h4 { color: var(--white); font-size: 1.1rem; margin-bottom: 16px; }
    footer a { color: #cdd8e8; transition: color .2s; font-size: .95rem; }
    footer a:hover { color: var(--gold-light); }
    .footer-links li { margin-bottom: 10px; }
    .socials { display: flex; gap: 12px; margin-top: 8px; }
    .socials a { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.1); display: grid; place-items: center; font-size: 1.1rem; transition: .25s; }
    .socials a:hover { background: var(--gold); color: var(--blue); transform: translateY(-3px); }
    .footer-bottom { text-align: center; padding-top: 28px; margin-top: 28px; border-top: 1px solid rgba(255,255,255,.12); font-size: .88rem; }

    /* ============ SCROLL TOP ============ */
    .scroll-top {
      position: fixed; bottom: 28px; right: 28px; width: 50px; height: 50px; border-radius: 50%;
      background: var(--gold); color: var(--blue); font-size: 1.4rem; display: grid; place-items: center;
      box-shadow: 0 8px 22px rgba(245,179,1,.5); opacity: 0; visibility: hidden; transition: .3s; z-index: 900;
    }
    .scroll-top.show { opacity: 1; visibility: visible; }
    .scroll-top:hover { transform: translateY(-4px); }

    /* ============ LOADER (WhatsApp-style splash) ============ */
    #loader {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--blue);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; transition: opacity .5s ease, visibility .5s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    #loader .loader-logo {
      width: 96px; height: 96px; border-radius: 22px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: grid; place-items: center; color: var(--blue);
      font-weight: 800; font-size: 2.4rem; font-family: 'Poppins', sans-serif;
      box-shadow: 0 10px 30px rgba(245,179,1,.45);
      animation: logoPop .6s ease both;
    }
    #loader .loader-name { color: var(--white); font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.15rem; letter-spacing: .5px; }
    #loader .loader-name small { display: block; color: var(--gold-light); font-size: .72rem; font-weight: 400; letter-spacing: 2px; text-align: center; margin-top: 4px; }
    #loader .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,.2); border-top-color: var(--gold);
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes logoPop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ============ ANIMATIONS ============ */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity .7s ease, transform .7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 980px) {
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
      .gallery-grid { grid-template-columns: repeat(3, 1fr); }
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .about-wrap, .contact-wrap { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .nav-links {
        position: absolute; top: 72px; left: 0; right: 0; background: var(--blue);
        flex-direction: column; gap: 0; max-height: 0; overflow: hidden; transition: max-height .35s ease; box-shadow: 0 8px 20px rgba(0,0,0,.2);
      }
      .nav-links.open { max-height: 420px; }
      .nav-links a { width: 100%; padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,.08); }
      .nav-links a::after { display: none; }
      .hamburger { display: flex; }
      .grid-3, .grid-2 { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-grid { grid-template-columns: 1fr; }
      .hero-stats { gap: 24px; }
      .values-list { grid-template-columns: 1fr; }
      .section { padding: 56px 0; }
    }
  </style>
</head>
<body>
  <!-- WhatsApp-style loading splash with the school logo -->
  <div id="loader">
    <div class="loader-logo">LTC</div>
    <div class="loader-name">Lilongwe Technical College<small>SKILLS · EXCELLENCE · FUTURE</small></div>
    <div class="spinner"></div>
  </div>

  <div id="root"></div>

  <!-- ============================================================
       React Application — all HTML, CSS & JS inline in this file.
       No backend, no build step. Loaded via Babel standalone.
       ============================================================ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ---------- Shared Data ---------- */
    const NAV_ITEMS = [
      { id: "home", label: "Home" },
      { id: "about", label: "About Us" },
      { id: "courses", label: "Courses" },
      { id: "admissions", label: "Admissions" },
      { id: "news", label: "News & Events" },
      { id: "gallery", label: "Gallery" },
      { id: "contact", label: "Contact" },
    ];

    const COURSES = [
      { icon: "⚙️", title: "Engineering", desc: "Mechanical, Civil & Automotive engineering with hands-on workshop training.", badge: "Flagship" },
      { icon: "💻", title: "Information Technology", desc: "Networking, programming, hardware and software systems administration.", badge: "Popular" },
      { icon: "📊", title: "Business Studies", desc: "Accounting, entrepreneurship, marketing and office management skills.", badge: "" },
      { icon: "🍽️", title: "Hospitality", desc: "Catering, hotel operations, food production and customer service.", badge: "" },
      { icon: "🔌", title: "Electrical Installation", desc: "Wiring, maintenance and industrial electrical systems installation.", badge: "TVET" },
      { icon: "🚰", title: "Plumbing", desc: "Pipe fitting, water systems, drainage and modern plumbing technology.", badge: "TVET" },
      { icon: "🧵", title: "Tailoring", desc: "Garment construction, fashion design and textile production.", badge: "" },
      { icon: "🛠️", title: "Other Technical Programs", desc: "Carpentry, masonry, welding and additional trade certifications.", badge: "" },
    ];

    const NEWS = [
      { img: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=600&q=80", date: "June 12, 2026", title: "LTC Graduates 450 Students at 14th Congregation", excerpt: "The college celebrated its largest graduating class yet, with top performers recognized in engineering and IT." },
      { img: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=600&q=80", date: "May 3, 2026", title: "New ICT Lab Equipped with Modern Workstations", excerpt: "Thanks to industry partners, students now train on up-to-date hardware and licensed software suites." },
      { img: "https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=600&q=80", date: "April 18, 2026", title: "LTC Signs MoU with Local Manufacturing Firms", excerpt: "The partnership opens internship and job-placement pathways for final-year technical students." },
    ];

    const EVENTS = [
      { day: "15", mon: "Aug", title: "Open Day & Campus Tour", loc: "Main Campus, Lilongwe" },
      { day: "02", mon: "Sep", title: "2026/27 Intake Orientation", loc: "Assembly Hall" },
      { day: "21", mon: "Oct", title: "Annual Skills Exhibition", loc: "College Grounds" },
    ];

    const GALLERY = [
      "https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=500&q=80",
      "https://images.unsplash.com/photo-1577896851231-70ef18881754?auto=format&fit=crop&w=500&q=80",
    ];

    const VALUES = ["Excellence", "Integrity", "Innovation", "Discipline", "Teamwork", "Community"];

    /* ---------- Reusable Reveal Hook ---------- */
    function useReveal() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } }),
          { threshold: 0.15 }
        );
        el.classList.add("reveal");
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    /* ---------- Header ---------- */
    function Header() {
      const [open, setOpen] = useState(false);
      const go = (id) => { setOpen(false); const t = document.getElementById(id); if (t) t.scrollIntoView({ behavior: "smooth" }); };
      return (
        <header>
          <div className="container nav">
            <a href="#home" className="logo" onClick={(e) => { e.preventDefault(); go("home"); }}>
              <span className="logo-mark">LTC</span>
              <span>Lilongwe Technical College<small>SKILLS · EXCELLENCE · FUTURE</small></span>
            </a>
            <nav className={"nav-links" + (open ? " open" : "")}>
              {NAV_ITEMS.map((n) => (
                <a key={n.id} href={"#" + n.id} onClick={(e) => { e.preventDefault(); go(n.id); }}>{n.label}</a>
              ))}
            </nav>
            <button className={"hamburger" + (open ? " open" : "")} aria-label="Menu" onClick={() => setOpen(!open)}>
              <span></span><span></span><span></span>
            </button>
          </div>
        </header>
      );
    }

    /* ---------- Footer ---------- */
    function Footer() {
      const go = (id) => { const t = document.getElementById(id); if (t) t.scrollIntoView({ behavior: "smooth" }); };
      return (
        <footer>
          <div className="container">
            <div className="footer-grid">
              <div>
                <h4>Lilongwe Technical College</h4>
                <p style={{ fontSize: ".95rem", marginBottom: 8 }}>Building a skilled nation through quality technical and vocational education.</p>
                <div className="socials">
                  <a href="https://www.facebook.com/profile.php?id=100075914242326" target="_blank" rel="noreferrer" aria-label="Facebook">📘</a>
                  <a href="#" aria-label="WhatsApp">💬</a>
                  <a href="#" aria-label="YouTube">▶️</a>
                  <a href="#" aria-label="Email">✉️</a>
                </div>
              </div>
              <div>
                <h4>Quick Links</h4>
                <ul className="footer-links">
                  {NAV_ITEMS.map((n) => (<li key={n.id}><a href={"#" + n.id} onClick={(e) => { e.preventDefault(); go(n.id); }}>{n.label}</a></li>))}
                </ul>
              </div>
              <div>
                <h4>Programs</h4>
                <ul className="footer-links">
                  <li><a href="#courses">Engineering</a></li>
                  <li><a href="#courses">Information Technology</a></li>
                  <li><a href="#courses">Hospitality</a></li>
                  <li><a href="#courses">Electrical Installation</a></li>
                </ul>
              </div>
              <div>
                <h4>Contact</h4>
                <ul className="footer-links">
                  <li>📞 +265 999 21 45 60</li>
                  <li>📞 +265 995 14 07 79</li>
                  <li>📧 info@ltc.mw</li>
                  <li>📍 Area 23, Lilongwe, Malawi</li>
                </ul>
              </div>
            </div>
            <div className="footer-bottom">
              © {new Date().getFullYear()} Lilongwe Technical College. All rights reserved. | Created by NADA (Next Level Advanced Digital Administration) — <a href="https://nadadigital.net/" target="_blank" rel="noreferrer" style={{ color: "var(--gold-light)" }}>nadadigital.net</a>
            </div>
          </div>
        </footer>
      );
    }

    /* ---------- Home ---------- */
    function Home() {
      const ref = useReveal();
      const go = (id) => { const t = document.getElementById(id); if (t) t.scrollIntoView({ behavior: "smooth" }); };
      return (
        <section className="hero" id="home" ref={ref}>
          <div className="container">
            <div className="hero-content">
              <h1>Welcome to <span className="hl">Lilongwe Technical College</span></h1>
              <p>Empowering Malawi's youth with world-class technical and vocational skills. Build your career in engineering, IT, business, hospitality and more.</p>
              <div className="hero-btns">
                <button className="btn btn-primary" onClick={() => go("admissions")}>🚀 Apply Now</button>
                <button className="btn btn-outline" onClick={() => go("courses")}>📚 Explore Courses</button>
              </div>
              <div className="hero-stats">
                <div className="stat"><strong>30+</strong><span>Years of Excellence</span></div>
                <div className="stat"><strong>8</strong><span>Technical Programs</span></div>
                <div className="stat"><strong>5000+</strong><span>Graduates</span></div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ---------- About ---------- */
    function About() {
      const ref = useReveal();
      return (
        <section className="section section-alt" id="about" ref={ref}>
          <div className="container">
            <h2 className="section-title">About Us</h2>
            <div className="gold-bar"></div>
            <div className="about-wrap" style={{ marginTop: 40 }}>
              <div className="about-img">
                <img src="https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=700&q=80" alt="Campus" />
              </div>
              <div>
                <h3 style={{ marginBottom: 14 }}>Our History</h3>
                <p style={{ color: "var(--muted)", marginBottom: 18 }}>
                  Lilongwe Technical College was established to meet the growing demand for skilled technical professionals in Malawi. Over the decades, it has grown into a leading centre of technical and vocational excellence, producing graduates who drive the nation's industrial and economic development.
                </p>
                <h3 style={{ marginBottom: 8 }}>Vision</h3>
                <p style={{ color: "var(--muted)", marginBottom: 18 }}>To be the premier technical college in Malawi, recognized for innovation, quality and relevance.</p>
                <h3 style={{ marginBottom: 8 }}>Mission</h3>
                <p style={{ color: "var(--muted)", marginBottom: 18 }}>To provide accessible, high-quality technical education and training that equips learners with practical skills for the modern workforce.</p>
                <h4 style={{ marginBottom: 8 }}>Core Values</h4>
                <div className="values-list">
                  {VALUES.map((v) => (<div className="value-item" key={v}>{v}</div>))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ---------- Courses ---------- */
    function Courses() {
      const ref = useReveal();
      return (
        <section className="section" id="courses" ref={ref}>
          <div className="container">
            <h2 className="section-title">Our Courses</h2>
            <div className="gold-bar"></div>
            <p className="section-sub">Choose from a wide range of technical and vocational programs designed to launch your career.</p>
            <div className="grid grid-3">
              {COURSES.map((c) => (
                <div className="card course-card" key={c.title}>
                  {c.badge && <span className="badge">{c.badge}</span>}
                  <div className="icon">{c.icon}</div>
                  <h3>{c.title}</h3>
                  <p>{c.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ---------- Admissions ---------- */
    function Admissions() {
      const ref = useReveal();
      const go = (id) => { const t = document.getElementById(id); if (t) t.scrollIntoView({ behavior: "smooth" }); };
      return (
        <section className="section section-alt" id="admissions" ref={ref}>
          <div className="container">
            <h2 className="section-title">Admissions</h2>
            <div className="gold-bar"></div>
            <p className="section-sub">Join thousands of students building practical skills for the future.</p>
            <div className="grid grid-2">
              <div>
                <h3 style={{ marginBottom: 16 }}>Admission Requirements</h3>
                <ul className="steps">
                  <div className="step"><div><strong>Minimum Education</strong><p style={{ color: "var(--muted)" }}>MSCE or equivalent certificate for certificate/diploma programs.</p></div></div>
                  <div className="step"><div><strong>Identification</strong><p style={{ color: "var(--muted)" }}>Valid national ID or passport and two passport-sized photos.</p></div></div>
                  <div className="step"><div><strong>Application Fee</strong><p style={{ color: "var(--muted)" }}>A non-refundable processing fee as stipulated per program.</p></div></div>
                  <div className="step"><div><strong>Interview / Aptitude</strong><p style={{ color: "var(--muted)" }}>Some programs require a short aptitude test or interview.</p></div></div>
                </ul>
              </div>
              <div>
                <h3 style={{ marginBottom: 16 }}>Application Process</h3>
                <ul className="steps">
                  <div className="step"><div><strong>Download Form</strong><p style={{ color: "var(--muted)" }}>Get the application form from our office or download below.</p></div></div>
                  <div className="step"><div><strong>Complete & Attach</strong><p style={{ color: "var(--muted)" }}>Fill in details and attach required documents.</p></div></div>
                  <div className="step"><div><strong>Submit</strong><p style={{ color: "var(--muted)" }}>Submit in person or via the contact channels provided.</p></div></div>
                  <div className="step"><div><strong>Confirmation</strong><p style={{ color: "var(--muted)" }}>Receive admission letter and join orientation.</p></div></div>
                </ul>
                <button className="btn btn-blue" style={{ marginTop: 16 }} onClick={() => alert("Application form download is a placeholder. Please contact the admissions office.")}>⬇️ Download Application Form</button>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ---------- News & Events ---------- */
    function News() {
      const ref = useReveal();
      return (
        <section className="section" id="news" ref={ref}>
          <div className="container">
            <h2 className="section-title">News & Events</h2>
            <div className="gold-bar"></div>
            <p className="section-sub">Stay up to date with the latest happenings around campus.</p>
            <div className="grid grid-2">
              <div>
                <h3 style={{ marginBottom: 20 }}>Latest News</h3>
                {NEWS.map((n, i) => (
                  <div className="card news-card" key={i} style={{ marginBottom: 18 }}>
                    <img src={n.img} alt={n.title} />
                    <div className="news-meta">{n.date}</div>
                    <h3 style={{ fontSize: "1.1rem", margin: "6px 0" }}>{n.title}</h3>
                    <p>{n.excerpt}</p>
                  </div>
                ))}
              </div>
              <div>
                <h3 style={{ marginBottom: 20 }}>Upcoming Events</h3>
                {EVENTS.map((e, i) => (
                  <div className="event-item" key={i}>
                    <div className="event-date"><strong>{e.day}</strong><span>{e.mon}</span></div>
                    <div>
                      <h4 style={{ marginBottom: 2 }}>{e.title}</h4>
                      <p style={{ color: "var(--muted)", fontSize: ".9rem" }}>📍 {e.loc}</p>
                    </div>
                  </div>
                ))}
                <div className="about-img" style={{ marginTop: 20 }}>
                  <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=700&q=80" alt="Event" />
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ---------- Gallery ---------- */
    function Gallery() {
      const ref = useReveal();
      return (
        <section className="section section-alt" id="gallery" ref={ref}>
          <div className="container">
            <h2 className="section-title">Campus Gallery</h2>
            <div className="gold-bar"></div>
            <p className="section-sub">A glimpse of life and facilities at Lilongwe Technical College.</p>
            <div className="gallery-grid">
              {GALLERY.map((src, i) => (
                <figure key={i}><img src={src} alt={"Campus photo " + (i + 1)} loading="lazy" /></figure>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ---------- Contact ---------- */
    function Contact() {
      const ref = useReveal();
      const [form, setForm] = useState({ name: "", email: "", message: "" });
      const [sent, setSent] = useState(false);
      const update = (k) => (e) => setForm({ ...form, [k]: e.target.value });
      const submit = (e) => {
        e.preventDefault();
        const text = `Hello Lilongwe Technical College,%0A%0AName: ${encodeURIComponent(form.name)}%0AEmail: ${encodeURIComponent(form.email)}%0AMessage: ${encodeURIComponent(form.message)}`;
        window.open("https://wa.me/265999214560?text=" + text, "_blank");
        setSent(true);
        setForm({ name: "", email: "", message: "" });
      };
      return (
        <section className="section" id="contact" ref={ref}>
          <div className="container">
            <h2 className="section-title">Contact Us</h2>
            <div className="gold-bar"></div>
            <p className="section-sub">We'd love to hear from you. Reach out or visit our campus.</p>
            <div className="contact-wrap">
              <div>
                <ul className="contact-info">
                  <li><span className="ci-icon">📞</span><div><strong>Phone</strong><p style={{ color: "var(--muted)" }}>+265 999 21 45 60<br />+265 995 14 07 79</p></div></li>
                  <li><span className="ci-icon">📧</span><div><strong>Email</strong><p style={{ color: "var(--muted)" }}>info@ltc.mw</p></div></li>
                  <li><span className="ci-icon">📍</span><div><strong>Location</strong><p style={{ color: "var(--muted)" }}>Area 23, Lilongwe, Malawi</p></div></li>
                  <li><span className="ci-icon">🕘</span><div><strong>Office Hours</strong><p style={{ color: "var(--muted)" }}>Mon–Fri: 8:00 – 16:30</p></div></li>
                </ul>
                <div className="map-wrap">
                  <iframe
                    title="Lilongwe Map"
                    src="https://www.google.com/maps?q=Lilongwe,%20Malawi&output=embed"
                    width="100%" height="280" style={{ border: 0, display: "block" }} allowFullScreen="" loading="lazy"></iframe>
                </div>
              </div>
              <div className="card">
                <h3 style={{ marginBottom: 16 }}>Send us a message</h3>
                {sent && <div className="form-msg">✅ Opening WhatsApp… your message is ready to send to the school.</div>}
                <form onSubmit={submit}>
                  <div className="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="Your name" value={form.name} onChange={update("name")} />
                  </div>
                  <div className="form-group">
                    <label>Email</label>
                    <input type="email" required placeholder="you@example.com" value={form.email} onChange={update("email")} />
                  </div>
                  <div className="form-group">
                    <label>Message</label>
                    <textarea rows="4" required placeholder="How can we help?" value={form.message} onChange={update("message")}></textarea>
                  </div>
                  <button className="btn btn-blue" type="submit" style={{ width: "100%", justifyContent: "center" }}>📲 Send via WhatsApp</button>
                </form>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ---------- Scroll To Top ---------- */
    function ScrollTop() {
      const [show, setShow] = useState(false);
      useEffect(() => {
        const onScroll = () => setShow(window.scrollY > 400);
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      return (
        <button className={"scroll-top" + (show ? " show" : "")} aria-label="Scroll to top"
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>↑</button>
      );
    }

    /* ---------- App ---------- */
    function App() {
      useEffect(() => {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        if (location.hash) { history.replaceState(null, "", location.pathname + location.search); }
        const loader = document.getElementById("loader");
        if (loader) { setTimeout(() => loader.classList.add("hidden"), 350); }
      }, []);
      return (
        <React.Fragment>
          <Header />
          <main>
            <Home />
            <About />
            <Courses />
            <Admissions />
            <News />
            <Gallery />
            <Contact />
          </main>
          <Footer />
          <ScrollTop />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
